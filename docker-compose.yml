services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Compose-internal overrides win over .env
      - MONGO_URI=mongodb://mongo:27017
      - FRONTEND_DIR=/app/frontend
      - FLASK_DEBUG=false
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "5000"          # internal only — reached via nginx

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8443:8443"     # HTTPS (self-signed)
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  mongo_data:
