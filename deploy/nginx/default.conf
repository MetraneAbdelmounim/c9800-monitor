# HTTPS termination on 8443 → gunicorn (Flask serves API + SPA)
server {
    listen 8443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ───────────────────────────────
    # 'always' so they're sent on error responses too. CSP is tuned for the
    # Angular SPA (same-origin scripts/styles, data: URLs for floor-plan images
    # and fonts). If you add a CDN/external API, widen the relevant directive.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # script-src allows cdnjs because index.html loads Chart.js + D3 from there.
    add_header Content-Security-Policy    "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' https://cdnjs.cloudflare.com; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Floor-plan image uploads are base64 data URLs (~9 MB cap server-side)
    client_max_body_size 15m;

    location / {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
