<div class="app-layout" [class.no-chrome]="hideChrome">
  <nav class="sidebar" *ngIf="!hideChrome">
    <div class="sidebar-header">
      <div class="brand">
        <svg class="brand-mark" width="34" height="34" viewBox="0 0 36 36" aria-hidden="true">
          <rect width="36" height="36" rx="9" fill="#1B3A6B"/>
          <g fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round">
            <path d="M9.5 16.5a12 12 0 0 1 17 0"/>
            <path d="M13.5 20.5a6.5 6.5 0 0 1 9 0"/>
          </g>
          <circle cx="18" cy="25" r="2.1" fill="#C8102E"/>
        </svg>
        <span class="brand-name">WireMetry</span>
      </div>
      <div class="logo-sub">Wireless Intelligence</div>
    </div>
    <div class="nav-items">
      <div class="nav-section">MONITORING</div>
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         class="nav-item">
        <span class="nav-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>

      <div class="nav-section">TROUBLESHOOT</div>
      <a *ngFor="let item of troubleshootNavItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         class="nav-item">
        <span class="nav-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>

      <div class="nav-section">SECURITY</div>
      <a *ngFor="let item of securityNavItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         class="nav-item">
        <span class="nav-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>

      <ng-container *ngIf="auth.hasRole('admin')">
        <div class="nav-section">ADMIN</div>
        <a *ngFor="let item of adminNavItems"
           [routerLink]="item.path"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      </ng-container>
    </div>

    <div class="user-box" *ngIf="auth.user() as u">
      <a class="user-info" routerLink="/profile" title="Edit profile">
        <div class="user-name">
          {{ u.username }}
          <span class="pw-warn" *ngIf="u.must_change_password" title="Password change required">!</span>
        </div>
        <div class="user-role">{{ u.role }}</div>
      </a>
      <button class="logout-btn" (click)="logout()" title="Sign out" aria-label="Sign out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-footer">
      <span class="status-wrap">
        <span class="status-dot" [class.up]="healthy" [class.down]="!healthy"></span>
        <span class="footer-text">{{ healthy ? 'Connected' : 'Offline' }}</span>
      </span>
      <button class="theme-btn" (click)="theme.toggle()"
              [title]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
              [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
        <!-- moon (currently dark → click for light) / sun (currently light → click for dark) -->
        <svg *ngIf="theme.theme() === 'dark'" width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg *ngIf="theme.theme() === 'light'" width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
      </button>
    </div>
  </nav>
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
