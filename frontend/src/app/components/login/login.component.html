<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <svg class="login-mark" width="52" height="52" viewBox="0 0 36 36" aria-hidden="true">
        <rect width="36" height="36" rx="10" fill="#1B3A6B"/>
        <g fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round">
          <path d="M9.5 16.5a12 12 0 0 1 17 0"/>
          <path d="M13.5 20.5a6.5 6.5 0 0 1 9 0"/>
        </g>
        <circle cx="18" cy="25" r="2.1" fill="#C8102E"/>
      </svg>
      <h1 class="login-title">WireMetry</h1>
      <div class="login-sub">Wireless Intelligence — sign in to continue</div>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <label class="field">
        <span class="field-label">Username</span>
        <input type="text" [(ngModel)]="username" name="username"
               autocomplete="username" autofocus [disabled]="loading" />
      </label>

      <label class="field">
        <span class="field-label">Password</span>
        <input type="password" [(ngModel)]="password" name="password"
               autocomplete="current-password" [disabled]="loading" />
      </label>

      <div class="error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>
