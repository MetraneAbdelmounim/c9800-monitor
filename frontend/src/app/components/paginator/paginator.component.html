<div class="paginator" *ngIf="totalCount() > 0">
  <div class="paginator-info">
    <span>{{ rangeStart() }}–{{ rangeEnd() }} of {{ totalCount() }}</span>
  </div>

  <div class="paginator-controls">
    <select class="page-size"
            [ngModel]="currentSize()"
            (ngModelChange)="onSizeChange($event)"
            title="Page size">
      <option *ngFor="let s of pageSizeOptions" [ngValue]="s">{{ s }} / page</option>
    </select>

    <button class="nav" (click)="prev()" [disabled]="currentPage() === 1" title="Previous">‹</button>

    <button *ngFor="let p of pages()"
            class="page-btn"
            [class.active]="p === currentPage()"
            [disabled]="p === '...'"
            (click)="goTo(p)">{{ p }}</button>

    <button class="nav" (click)="next()" [disabled]="currentPage() === totalPages()" title="Next">›</button>
  </div>
</div>
